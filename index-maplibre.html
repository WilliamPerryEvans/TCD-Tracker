  #map { background: #0a0a1a; }

  #status {
    position: absolute; top: 12px; left: 12px; z-index: 5;
    background: rgba(13,17,23,0.92); border: 1px solid #21262d; border-radius: 8px;
    padding: 10px 14px; color: #e6edf3; font-size: 13px; line-height: 1.5;
    max-width: 320px;
  }
  #status .title { font-weight: 700; margin-bottom: 4px; }
  #status .ok   { color: #3fb950; }
  #status .warn { color: #e3b341; }
  #status .err  { color: #f85149; }

  /* ── SIDEBAR (copied from index.html; --header-h not yet ported — Phase 5) ── */
  #sidebar {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 380px;
    background: rgba(13, 17, 23, 0.97);
    backdrop-filter: blur(12px);
    border-left: 1px solid #21262d;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 200;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  #sidebar.open { transform: translateX(0); }

  #sidebar-close {
    position: absolute;
    top: 14px; right: 16px;
    background: none; border: none;
    color: #8b949e; font-size: 20px;
    cursor: pointer; line-height: 1; padding: 4px;
  }
  #sidebar-close:hover { color: #f0f6fc; }

  #sidebar-inner { padding: 20px; }

  #sidebar-country-header {
    padding-bottom: 16px;
    border-bottom: 1px solid #21262d;
    margin-bottom: 16px;
  }

  #sidebar-flag { font-size: 36px; margin-bottom: 8px; }
  #sidebar-country-name { font-size: 20px; font-weight: 700; color: #f0f6fc; }

  .transfer-badge {
    display: inline-block;
    margin-top: 6px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .badge-confirmed { background: rgba(248,81,73,0.15); color: #f85149; border: 1px solid rgba(248,81,73,0.3); }
  .badge-pending { background: rgba(227,179,65,0.15); color: #e3b341; border: 1px solid rgba(227,179,65,0.3); }

  .info-block { margin-bottom: 14px; }
  .info-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: #8b949e; margin-bottom: 4px; }
  .info-value { font-size: 14px; color: #c9d1d9; line-height: 1.5; }
  .info-value.highlight { color: #f85149; font-weight: 500; }
  .info-value.funding { color: #3fb950; font-weight: 600; }

  .harms-box {
    background: rgba(248,81,73,0.06);
    border: 1px solid rgba(248,81,73,0.2);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 13px; color: #c9d1d9; line-height: 1.6;
  }

  .legal-tag {
    display: inline-block;
    background: rgba(88,166,255,0.12);
    border: 1px solid rgba(88,166,255,0.25);
    color: #58a6ff;
    font-size: 12px; padding: 2px 8px;
    border-radius: 4px; margin: 2px 2px 2px 0;
  }

  .divider { border: none; border-top: 1px solid #21262d; margin: 14px 0; }

  .intl-response {
    background: rgba(88,166,255,0.06);
    border: 1px solid rgba(88,166,255,0.18);
    border-radius: 5px;
    padding: 8px 10px;
    margin-bottom: 6px;
  }
  .intl-response:last-child { margin-bottom: 0; }
  .intl-response-meta { font-size: 11px; color: #58a6ff; font-weight: 600; margin-bottom: 3px; letter-spacing: 0.02em; }
  .intl-response-text { font-size: 13px; color: #c9d1d9; line-height: 1.55; }

  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-track { background: transparent; }
  #sidebar::-webkit-scrollbar-thumb { background: #21262d; border-radius: 2px; }

  #hint {
    position: fixed; bottom: 24px; right: 24px;
    z-index: 100; font-size: 12px; color: #484f58; text-align: right;
  }
</style>

// ── ISO 3166-1 NUMERIC -> COUNTRY NAME (copied verbatim from index.html) ──
const ISO_TO_NAME = {
  '028': 'Antigua and Barbuda',
  '064': 'Bhutan',
  '084': 'Belize',
  '108': 'Burundi',
  '132': 'Cabo Verde',
  '120': 'Cameroon',
  '140': 'Central African Republic',
  '188': 'Costa Rica',
  '180': 'Democratic Republic of Congo',
  '212': 'Dominica',
  '214': 'Dominican Republic',
  '218': 'Ecuador',
  '226': 'Equatorial Guinea',
  '222': 'El Salvador',
  '748': 'Eswatini',
  '288': 'Ghana',
  '320': 'Guatemala',
  '328': 'Guyana',
  '340': 'Honduras',
  '383': 'Kosovo',
  '430': 'Liberia',
  '434': 'Libya',
  '484': 'Mexico',
  '498': 'Moldova',
  '585': 'Palau',
  '591': 'Panama',
  '600': 'Paraguay',
  '616': 'Poland',
  '646': 'Rwanda',
  '694': 'Sierra Leone',
  '728': 'South Sudan',
  '659': 'St. Kitts and Nevis',
  '662': 'St. Lucia',
  '800': 'Uganda',
  '860': 'Uzbekistan'
};

const DATA_BY_NAME = {};
COUNTRIES.forEach(c => DATA_BY_NAME[c.name] = c);

const REGION_GROUPS = {
  'Americas':      ['Antigua and Barbuda','Belize','Costa Rica','Dominica','Dominican Republic','Ecuador',
                    'El Salvador','Guatemala','Guyana','Honduras','Mexico','Panama',
                    'Paraguay','St. Kitts and Nevis','St. Lucia'],
  'Africa':        ['Burundi','Cabo Verde','Cameroon','Central African Republic','Democratic Republic of Congo',
                    'Equatorial Guinea','Eswatini','Ghana','Liberia',
                    'Libya','Rwanda','Sierra Leone','South Sudan','Uganda'],
  'Europe':        ['Kosovo','Moldova','Poland'],
  'Asia & Pacific':['Bhutan','Palau','Uzbekistan']
};
const NAME_TO_REGION = {};
Object.entries(REGION_GROUPS).forEach(([r, names]) => names.forEach(n => NAME_TO_REGION[n] = r));

// Small island nations omitted from the 110m topojson resolution —
// pulled from the 50m file instead (same set as the current Leaflet build, + Cabo Verde).
const SMALL_ISLAND_ISOS = new Set(['028', '212', '659', '662', '585', '132']);

// ──────────────────────────────────────────────
// PHASE 1: bare map + geometry + data join
// ──────────────────────────────────────────────
const statusBody = document.getElementById('status-body');

const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {},
    layers: [
      { id: 'background', type: 'background', paint: { 'background-color': '#0a0a1a' } }
    ]
  },
  center: [20, 10],   // [lng, lat] -- MapLibre order, opposite of Leaflet
  zoom: 2,
  renderWorldCopies: false,
  maxPitch: 0,
});

map.addControl(new maplibregl.NavigationControl(), 'top-right');

map.on('load', async () => {
  try {
    const [topo110, topo50] = await Promise.all([
      fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r => r.json()),
      fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json').then(r => r.json()),
    ]);

    const countries110 = topojson.feature(topo110, topo110.objects.countries);
    const countries50  = topojson.feature(topo50,  topo50.objects.countries);

    // Everything from 110m EXCEPT the small-island set; those come from 50m instead
    // (110m omits most small island nations entirely, including several TCD countries).
    const mainFeatures = countries110.features.filter(
      f => !SMALL_ISLAND_ISOS.has(String(f.id).padStart(3, '0'))
    );
    const islandFeatures = countries50.features.filter(
      f => SMALL_ISLAND_ISOS.has(String(f.id).padStart(3, '0'))
    );
    const allFeatures = [...mainFeatures, ...islandFeatures];

    // Join geometry -> COUNTRIES data via ISO numeric code, with a name-based
    // fallback for territories Natural Earth ships with no numeric ISO id
    // (e.g. Kosovo — disputed status, id is undefined in world-atlas).
    //
    // `fid` (feature index) doubles as our stable feature-state id via
    // `promoteId` below — deterministic, unlike relying on generateId's
    // internal indexing, and lets us look up a feature's id by country
    // name (NAME_TO_FEATURE_ID) for click-to-select handling in Phase 3.
    const matchedNames = new Set();
    const NAME_TO_FEATURE_ID = {};
    allFeatures.forEach((feature, idx) => {
      const neName = feature.properties && feature.properties.name;
      const iso = String(feature.id).padStart(3, '0');
      const name = ISO_TO_NAME[iso] || (neName && DATA_BY_NAME[neName] ? neName : null);
      const data = name ? DATA_BY_NAME[name] : null;
      if (data) { matchedNames.add(name); NAME_TO_FEATURE_ID[name] = idx; }
      feature.properties = {
        fid: idx,
        iso,
        name: name || null,
        hasAgreement: !!data,
        agreementType: data ? data.agreementType : null,
        transfersOccurred: data ? data.transfersOccurred : false,
        region: name ? (NAME_TO_REGION[name] || null) : null,
      };
    });

    // Sanity check: did every COUNTRIES entry find a matching polygon?
    const unmatched = COUNTRIES.map(c => c.name).filter(n => !matchedNames.has(n));

    map.addSource('countries', {
      type: 'geojson',
      data: { type: 'FeatureCollection', features: allFeatures },
      promoteId: 'fid',
    });

    // ── PHASE 2: choropleth styling — exact parity with the current
    // Leaflet flat-map's mapPolyStyle() (dark theme; light-theme swap
    // and live filter-dimming are wired in Phase 8 / Phase 4).
    //
    // Precedence replicated faithfully from the original (including its
    // one quirk: hovering a selected country shows hover style, not
    // selected style — opacity/weight don't combine, by design there).
    //   hasAgreement === false      -> solid dim background, fixed style
    //   hasAgreement === true:
    //     hover    -> opacity 0.8, weight (confirmed ? 2.5 : 2)
    //     selected -> opacity 0.9, weight 2.5      (selected wiring: Phase 3)
    //     default  -> opacity 0.75, weight 1.5
    //   stroke color never changes with hover/selected, only fill does.

    map.addLayer({
      id: 'country-fills',
      type: 'fill',
      source: 'countries',
      paint: {
        'fill-color': [
          'case',
          ['!', ['get', 'hasAgreement']], '#162030',                          // untracked background (dark theme)
          ['==', ['get', 'transfersOccurred'], true], '#f85149',               // red — transfers confirmed
          /* agreement only */ '#e3b341'                                       // yellow
        ],
        'fill-opacity': [
          'case',
          ['!', ['get', 'hasAgreement']], 1,
          ['boolean', ['feature-state', 'hover'], false], 0.8,
          ['boolean', ['feature-state', 'selected'], false], 0.9,
          /* default */ 0.75
        ]
      }
    });

    map.addLayer({
      id: 'country-borders',
      type: 'line',
      source: 'countries',
      paint: {
        'line-color': [
          'case',
          ['!', ['get', 'hasAgreement']], '#0d1828',                          // untracked stroke (dark theme)
          ['==', ['get', 'transfersOccurred'], true], '#ff6b60',               // light red
          /* agreement only */ '#f0c840'                                       // light gold
        ],
        'line-width': [
          'case',
          ['!', ['get', 'hasAgreement']], 0.5,
          ['boolean', ['feature-state', 'hover'], false],
            ['case', ['==', ['get', 'transfersOccurred'], true], 2.5, 2],
          ['boolean', ['feature-state', 'selected'], false], 2.5,
          /* default */ 1.5
        ]
      }
    });

    // Minimal hover feedback (full sidebar/click wiring is Phase 3)
    let hoveredId = null;
    map.on('mousemove', 'country-fills', (e) => {
      if (e.features.length === 0) return;
      if (hoveredId !== null) map.setFeatureState({ source: 'countries', id: hoveredId }, { hover: false });
      hoveredId = e.features[0].id;
      map.setFeatureState({ source: 'countries', id: hoveredId }, { hover: true });
      map.getCanvas().style.cursor = e.features[0].properties.hasAgreement ? 'pointer' : '';
    });
    map.on('mouseleave', 'country-fills', () => {
      if (hoveredId !== null) map.setFeatureState({ source: 'countries', id: hoveredId }, { hover: false });
      hoveredId = null;
      map.getCanvas().style.cursor = '';
    });

    // ── PHASE 3: click -> existing sidebar ──
    // Matches the current site's behavior exactly: only the close button
    // dismisses the sidebar (the live site has no click-empty-area-to-close
    // handler, so this scaffold intentionally doesn't add one either).
    let selectedName = null;
    let selectedFeatureId = null;

    function setSelected(name) {
      if (selectedFeatureId !== null) {
        map.setFeatureState({ source: 'countries', id: selectedFeatureId }, { selected: false });
      }
      selectedName = name;
      selectedFeatureId = name ? NAME_TO_FEATURE_ID[name] : null;
      if (selectedFeatureId !== undefined && selectedFeatureId !== null) {
        map.setFeatureState({ source: 'countries', id: selectedFeatureId }, { selected: true });
      }
    }

    function openSidebar(country) {
      setSelected(country.name);

      // NOTE coordinate order: COUNTRIES stores {lat, lng}; MapLibre's
      // flyTo center wants [lng, lat] -- the opposite of Leaflet's
      // flyTo([lat, lng]) used in the current site. Flipped explicitly here.
      map.flyTo({ center: [country.lng, country.lat], zoom: 5, duration: 900 });

      document.getElementById('sidebar-flag').textContent = country.flag;
      document.getElementById('sidebar-country-name').textContent = country.name;

      const badge = document.getElementById('sidebar-transfer-badge');
      badge.textContent = country.transfersOccurred ? 'Transfers Confirmed' : 'No Known Transfers';
      badge.className = 'transfer-badge ' + (country.transfersOccurred ? 'badge-confirmed' : 'badge-pending');

      const intlResponsesHtml = (country.intlResponses && country.intlResponses.length > 0)
        ? country.intlResponses.map(r =>
            `<div class="intl-response">
              <div class="intl-response-meta">${r.date} &mdash; ${r.body}</div>
              <div class="intl-response-text">${r.statement}</div>
            </div>`).join('')
        : null;

      const harmsHtml = (country.harms && country.harms !== 'No known transfers')
        ? `<div class="harms-box">${country.harms}</div>`
        : `<div class="info-value" style="color:#484f58;font-style:italic;">No known transfers — no harms documented</div>`;

      const usLegalHtml = country.usLegal === 'No legal challenges reported'
        ? `<div class="info-value" style="color:#484f58;">None reported</div>`
        : country.usLegal.split(/,\s*/).map(t => `<span class="legal-tag">${t.trim()}</span>`).join('');

      const fundingClass = (!country.funding.startsWith('No direct') && country.funding !== 'No financial compensation reported') ? 'funding' : '';

      document.getElementById('sidebar-content').innerHTML = `
        <div class="info-block">
          <div class="info-label">Agreement Type</div>
          <div class="info-value">${country.agreementType}</div>
        </div>
        <div class="info-block">
          <div class="info-label">Agreement Format</div>
          <div class="info-value">${country.format}</div>
        </div>
        <div class="info-block">
          <div class="info-label">Agreement Date</div>
          <div class="info-value">${country.agreementDate}</div>
        </div>
        <hr class="divider">
        <div class="info-block">
          <div class="info-label">Transfer Dates</div>
          <div class="info-value ${country.transfersOccurred ? 'highlight' : ''}">${country.transferDates}</div>
        </div>
        <div class="info-block">
          <div class="info-label">Mode of Transfer</div>
          <div class="info-value">${country.mode}</div>
        </div>
        <div class="info-block">
          <div class="info-label">Detained on Arrival</div>
          <div class="info-value">${country.detained}</div>
        </div>
        <div class="info-block">
          <div class="info-label">Transfer Cap</div>
          <div class="info-value">${country.cap}</div>
        </div>
        <hr class="divider">
        <div class="info-block">
          <div class="info-label">U.S. Funding Provided</div>
          <div class="info-value ${fundingClass}">${country.funding}</div>
        </div>
        <hr class="divider">
        <div class="info-block">
          <div class="info-label">U.S. Legal Challenges</div>
          <div>${usLegalHtml}</div>
        </div>
        <div class="info-block">
          <div class="info-label">International Legal Action</div>
          <div class="info-value">${country.intlLegal}</div>
        </div>
        ${intlResponsesHtml ? `
        <hr class="divider">
        <div class="info-block">
          <div class="info-label">International Responses</div>
          ${intlResponsesHtml}
        </div>` : ''}
        <hr class="divider">
        <div class="info-block">
          <div class="info-label">Documented Harms</div>
          ${harmsHtml}
        </div>
      `;

      document.getElementById('sidebar').classList.add('open');
    }

    function closeSidebar() {
      setSelected(null);
      document.getElementById('sidebar').classList.remove('open');
      // Leaflet's flyTo([20, -20], 2) -> MapLibre order is [lng, lat] = [-20, 20].
      map.flyTo({ center: [-20, 20], zoom: 2, duration: 900 });
    }

    // Exposed globally so the sidebar's inline onclick="closeSidebar()" can reach it.
    window.closeSidebar = closeSidebar;

    map.on('click', 'country-fills', (e) => {
      if (e.features.length === 0) return;
      const props = e.features[0].properties;
      if (!props.hasAgreement || !props.name) return;
      const country = DATA_BY_NAME[props.name];
      if (!country) return;
      openSidebar(country);
    });

    // ── Phase 1 verification readout ──
    const trackedRendered = allFeatures.filter(f => f.properties.hasAgreement).length;
    let html = `<span class="${trackedRendered === 35 ? 'ok' : 'warn'}">${trackedRendered} / 35 tracked countries rendered</span>`;
    if (unmatched.length > 0) {
      html += `<br><span class="err">Unmatched (no geometry found): ${unmatched.join(', ')}</span>`;
    } else {
      html += `<br><span class="ok">All COUNTRIES entries matched to geometry ✓</span>`;
    }
    statusBody.innerHTML = html;
    console.log('Phase 1 check — tracked countries rendered:', trackedRendered, '/ 35');
    console.log('Unmatched COUNTRIES entries:', unmatched);

  } catch (err) {
    statusBody.innerHTML = `<span class="err">Load error: ${err.message}</span>`;
    console.error(err);
  }
});
</script>
</body>
</html>
